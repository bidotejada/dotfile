font_family      UbuntuMono Nerd Font Mono
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        14.0

cursor_shape     block
cursor_blink_interval -1
scrollback_lines 10000
scrollbar scrolled
scrollbar_width 0.5
enable_audio_bell no
background_opacity 0.95
tab_bar_edge bottom

shell /bin/zsh
editor nvim
